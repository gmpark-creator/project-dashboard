/* ▲▲▲  데이터 끝  ▲▲▲ */

// ===== 상태 / 타입 메타 =====
const STATUS = {
  'completed':   { label:'완성',    en:'Completed',   dot:'bg-emerald-400',
    badge:'bg-emerald-500/10 text-emerald-300 ring-1 ring-emerald-500/30', bar:'from-emerald-500 to-teal-400' },
  'in-progress': { label:'진행 중', en:'In Progress', dot:'bg-amber-400',
    badge:'bg-amber-500/10 text-amber-300 ring-1 ring-amber-500/30',       bar:'from-amber-500 to-orange-400' },
  'paused':      { label:'보류',    en:'Paused',      dot:'bg-violet-400',
    badge:'bg-violet-500/10 text-violet-300 ring-1 ring-violet-500/30',    bar:'from-violet-500 to-fuchsia-400' }
};
const ITYPE = {
  '완료': { cls:'bg-emerald-500/10 text-emerald-300 ring-emerald-500/25', icon:'check-circle-2', line:'bg-emerald-500/60' },
  '이슈': { cls:'bg-amber-500/10 text-amber-300 ring-amber-500/25',       icon:'alert-triangle', line:'bg-amber-500/60' },
  '보류': { cls:'bg-violet-500/10 text-violet-300 ring-violet-500/25',    icon:'pause-circle',   line:'bg-violet-500/60' }
};

// ===== 헬퍼 =====
const $ = s => document.querySelector(s);
function parseD(s) { return new Date(s + 'T00:00:00'); }
function fmtD(s) {
  const d = parseD(s);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function durationText(a, b) {
  const days = Math.round((parseD(b) - parseD(a)) / 86400000);
  if (days < 1) return '1일';
  if (days < 31) return days + '일';
  const m = Math.round(days / 30.44);
  return m < 12 ? '약 ' + m + '개월' : '약 ' + (days/365.25).toFixed(1) + '년';
}
function stackIcon(t) {
  const s = t.toLowerCase();
  if (/three|webgl|3d/.test(s)) return 'box';
  if (/python/.test(s)) return 'terminal';
  if (/script|html|css/.test(s)) return 'code';
  if (/map|leaflet|지도/.test(s)) return 'map';
  if (/api|ais|stream/.test(s)) return 'satellite-dish';
  if (/socket|실시간/.test(s)) return 'radio';
  if (/torch|opencv|ai|모델|cv/.test(s)) return 'cpu';
  if (/ffmpeg|영상|video/.test(s)) return 'film';
  if (/github|pages|배포|deploy/.test(s)) return 'git-branch';
  return 'box';
}

// ===== 사이드바 =====
let activeId = 'solar';
function renderSidebar() {
  $('#projList').innerHTML = PROJECTS.map(p => {
    const st = STATUS[p.status];
    const on = p.id === activeId;
    return `
    <button data-id="${p.id}"
      class="proj-btn group w-full text-left rounded-xl p-3 flex items-center gap-3 transition-all duration-200
             ${on ? 'bg-slate-800/90 ring-1 ring-indigo-500/40 shadow-lg shadow-indigo-950/40'
                  : 'hover:bg-slate-800/50'}">
      <div class="grid place-items-center w-10 h-10 rounded-lg shrink-0 transition-colors
                  ${on ? 'bg-indigo-500/20 text-indigo-300' : 'bg-slate-800 text-slate-400 group-hover:text-slate-200'}">
        <i data-lucide="${p.icon}" class="w-5 h-5"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-[13px] font-semibold truncate ${on ? 'text-white' : 'text-slate-300'}">${p.name}</p>
        <p class="text-[11px] text-slate-500 truncate">${p.subtitle}</p>
      </div>
      <span class="w-2 h-2 rounded-full shrink-0 ${st.dot}"></span>
    </button>`;
  }).join('');
  $('#projList').querySelectorAll('.proj-btn').forEach(b =>
    b.addEventListener('click', () => selectProject(b.dataset.id)));
}
function renderSummary() {
  const cnt = { completed:0, 'in-progress':0, paused:0 };
  PROJECTS.forEach(p => cnt[p.status]++);
  const cell = (n, label, color) => `
    <div class="rounded-lg bg-slate-900/80 ring-1 ring-slate-800 px-2 py-2.5 text-center">
      <div class="text-lg font-extrabold ${color}">${n}</div>
      <div class="text-[10px] text-slate-500 mt-0.5">${label}</div>
    </div>`;
  $('#summary').innerHTML =
    cell(cnt.completed,'완성','text-emerald-300') +
    cell(cnt['in-progress'],'진행 중','text-amber-300') +
    cell(cnt.paused,'보류','text-violet-300');
}

// ===== 상세 패널 =====
function renderDetail(p) {
  const st = STATUS[p.status];
  const span = Math.max(1, parseD(p.latest) - parseD(p.start));

  // 가로형 타임라인 — 마일스톤 점 배치
  const dots = p.milestones.map(m => {
    const f = Math.min(100, Math.max(0, (parseD(m.date) - parseD(p.start)) / span * 100));
    return `<div class="absolute -top-[7px] w-4 h-4 rounded-full bg-slate-300 ring-4 ring-slate-950
                 hover:scale-125 transition-transform cursor-default" style="left:calc(${f}% - 8px)"
                 title="${m.date} · ${m.title}"></div>`;
  }).join('');

  // 기술 스택 칩
  const stack = p.stack.map(t => `
    <span class="inline-flex items-center gap-1.5 rounded-lg bg-slate-800/90 ring-1 ring-slate-700
                 px-2.5 py-1.5 text-[12px] text-slate-300">
      <i data-lucide="${stackIcon(t)}" class="w-3.5 h-3.5 text-indigo-400"></i>${t}
    </span>`).join('');

  // 이슈 / 완료 내역
  const issues = p.issues.map(it => {
    const m = ITYPE[it.type];
    return `
    <div class="flex gap-3.5 rounded-xl bg-slate-900/70 ring-1 ring-slate-800 p-3.5">
      <span class="grid place-items-center w-9 h-9 rounded-lg shrink-0 ring-1 ${m.cls}">
        <i data-lucide="${m.icon}" class="w-[18px] h-[18px]"></i>
      </span>
      <div class="min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-[10.5px] font-bold px-1.5 py-0.5 rounded ring-1 ${m.cls}">${it.type}</span>
          <p class="text-[13px] font-semibold text-slate-100">${it.title}</p>
        </div>
        <p class="text-[12px] text-slate-400 mt-1 leading-relaxed">${it.desc}</p>
      </div>
    </div>`;
  }).join('');

  // 세로형 마일스톤 타임라인
  const timeline = p.milestones.map((m, i) => {
    const last = i === p.milestones.length - 1;
    return `
    <div class="relative pl-8 ${last ? '' : 'pb-5'}">
      ${last ? '' : '<div class="absolute left-[7px] top-4 bottom-0 w-px bg-slate-700"></div>'}
      <div class="absolute left-0 top-1 w-3.5 h-3.5 rounded-full bg-gradient-to-br ${st.bar} ring-4 ring-slate-950"></div>
      <p class="text-[11px] font-semibold text-indigo-300">${fmtD(m.date)}</p>
      <p class="text-[13.5px] font-semibold text-slate-100 mt-0.5">${m.title}</p>
      <p class="text-[12px] text-slate-400 mt-0.5">${m.desc}</p>
    </div>`;
  }).join('');

  const chip = (icon, label, val) => `
    <div class="flex items-center gap-2.5 rounded-xl bg-slate-900/70 ring-1 ring-slate-800 px-3.5 py-2.5">
      <i data-lucide="${icon}" class="w-4 h-4 text-indigo-400"></i>
      <div><p class="text-[10px] text-slate-500 leading-none">${label}</p>
        <p class="text-[13px] font-semibold text-slate-100 mt-1">${val}</p></div>
    </div>`;

  const card = (icon, title, body, delay, span2) => `
    <section class="reveal ${span2 ? 'lg:col-span-2' : ''} rounded-2xl border border-slate-800 bg-slate-900/55
             p-6 hover:border-slate-700 transition-colors" style="animation-delay:${delay}ms">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-500/15 text-indigo-300">
          <i data-lucide="${icon}" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-100">${title}</h3>
      </div>${body}
    </section>`;

  $('#detail').innerHTML = `
    <!-- 히어로 -->
    <header class="reveal" style="animation-delay:0ms">
      <div class="flex items-start gap-5 flex-wrap">
        <div class="grid place-items-center w-16 h-16 rounded-2xl bg-gradient-to-br ${st.bar} shadow-xl shadow-slate-950/60">
          <i data-lucide="${p.icon}" class="w-8 h-8 text-white"></i>
        </div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-3 flex-wrap">
            <h2 class="text-[26px] font-extrabold text-white leading-tight">${p.name}</h2>
            <span class="inline-flex items-center gap-1.5 text-[12px] font-bold px-2.5 py-1 rounded-full ${st.badge}">
              <span class="w-1.5 h-1.5 rounded-full ${st.dot}"></span>${st.label} · ${st.en}
            </span>
          </div>
          <p class="text-[13.5px] text-slate-400 mt-1">${p.subtitle}</p>
        </div>
        ${p.link ? `<a href="${p.link}" target="_blank" rel="noopener"
          class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition-colors
                 px-4 py-2.5 text-[13px] font-semibold text-white shadow-lg shadow-indigo-950/50">
          <i data-lucide="external-link" class="w-4 h-4"></i>라이브 보기</a>` : ''}
      </div>
      <p class="text-[13.5px] text-slate-300 leading-relaxed mt-5 max-w-3xl">${p.summary}</p>
    </header>

    <!-- 가로형 타임라인 바 -->
    <section class="reveal mt-7 rounded-2xl border border-slate-800 bg-slate-900/55 p-6" style="animation-delay:80ms">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-[13px] font-bold text-slate-200 flex items-center gap-2">
          <i data-lucide="git-commit-horizontal" class="w-4 h-4 text-indigo-400"></i>진행 타임라인</h3>
        <span class="text-[12px] font-semibold ${st.badge.split(' ')[1]}">진척도 ${p.progress}%</span>
      </div>
      <div class="relative mt-5 mb-1">
        <div class="h-2.5 rounded-full bg-slate-800"></div>
        <div class="growbar absolute top-0 h-2.5 rounded-full bg-gradient-to-r ${st.bar}"
             style="width:${p.progress}%"></div>
        ${dots}
      </div>
      <div class="flex justify-between text-[11.5px] text-slate-500 mt-3">
        <span class="flex items-center gap-1"><i data-lucide="play" class="w-3 h-3"></i>${fmtD(p.start)}</span>
        <span class="flex items-center gap-1">${fmtD(p.latest)}<i data-lucide="flag" class="w-3 h-3"></i></span>
      </div>
    </section>

    <!-- 퀵 스탯 -->
    <div class="reveal grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4" style="animation-delay:140ms">
      ${chip('calendar-clock','진행 기간', durationText(p.start, p.latest))}
      ${chip('milestone','마일스톤', p.milestones.length + '단계')}
      ${chip('layers','기술 스택', p.stack.length + '종')}
      ${chip('activity','현재 상태', st.label)}
    </div>

    <!-- 카드 그리드 -->
    <div class="grid lg:grid-cols-2 gap-5 mt-5">
      ${card('workflow','진행 방식',
        `<p class="text-[13px] text-slate-300 leading-relaxed">${p.method}</p>`, 200)}
      ${card('layers','기술 스택',
        `<div class="flex flex-wrap gap-2">${stack}</div>`, 260)}
      ${card('clipboard-list','핵심 이슈 · 완료 내역',
        `<div class="grid sm:grid-cols-2 gap-3">${issues}</div>`, 320, true)}
      ${card('git-commit-vertical','프로젝트 마일스톤',
        `<div class="mt-1">${timeline}</div>`, 380, true)}
    </div>

    <p class="text-[11px] text-slate-600 text-center mt-8">
      AI 협업 진행 보고서 · GPT × Claude &nbsp;|&nbsp; 데이터는 코드 상단 <code class="text-slate-500">PROJECTS</code> 객체에서 수정
    </p>`;

  lucide.createIcons();
}

// ===== 프로젝트 선택 =====
function selectProject(id) {
  activeId = id;
  renderSidebar();
  renderDetail(PROJECTS.find(p => p.id === id));
  document.querySelector('main').scrollTo({ top:0, behavior:'smooth' });
  lucide.createIcons();
}

// ===== 초기화 =====
renderSidebar();
renderSummary();
selectProject(activeId);
lucide.createIcons();
</script>
</body>
</html>

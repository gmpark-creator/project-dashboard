<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1024" viewBox="0 0 2048 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#1b1b40"/>
      <stop offset="0.45" stop-color="#121233"/>
      <stop offset="1" stop-color="#08081a"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.28" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#3a4db0" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#3a4db0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.78" cy="0.72" r="0.55">
      <stop offset="0" stop-color="#7a3db0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7a3db0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0.62" cy="0.18" r="0.4">
      <stop offset="0" stop-color="#2f8fb0" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2f8fb0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="2048" height="1024" fill="url(#sky)"/>
  <rect width="2048" height="1024" fill="url(#g1)"/>
  <rect width="2048" height="1024" fill="url(#g2)"/>
  <rect width="2048" height="1024" fill="url(#g3)"/>

  <!-- 잔잔한 별/빛 입자 (랜덤 배치, 매우 옅게) -->
  <g fill="#cdd6ff">
    <circle cx="180" cy="140" r="1.6" opacity="0.7"/><circle cx="420" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="650" cy="120" r="1.8" opacity="0.6"/><circle cx="900" cy="240" r="1.1" opacity="0.45"/>
    <circle cx="1150" cy="160" r="1.5" opacity="0.6"/><circle cx="1380" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="1620" cy="180" r="1.7" opacity="0.6"/><circle cx="1850" cy="280" r="1.2" opacity="0.5"/>
    <circle cx="300" cy="560" r="1.3" opacity="0.5"/><circle cx="760" cy="640" r="1.6" opacity="0.6"/>
    <circle cx="1240" cy="600" r="1.2" opacity="0.45"/><circle cx="1700" cy="560" r="1.5" opacity="0.55"/>
    <circle cx="220" cy="820" r="1.5" opacity="0.55"/><circle cx="560" cy="900" r="1.2" opacity="0.45"/>
    <circle cx="980" cy="860" r="1.7" opacity="0.6"/><circle cx="1440" cy="900" r="1.2" opacity="0.5"/>
    <circle cx="1820" cy="840" r="1.5" opacity="0.55"/><circle cx="1050" cy="520" r="1.3" opacity="0.5"/>
  </g>
  <!-- 큰 보케 글로우 몇 개 -->
  <circle cx="360" cy="280" r="80" fill="url(#dot)" opacity="0.25"/>
  <circle cx="1640" cy="720" r="110" fill="url(#dot)" opacity="0.2"/>
  <circle cx="1500" cy="200" r="70" fill="url(#dot)" opacity="0.18"/>

  <rect width="2048" height="1024" fill="url(#vig)"/>
</svg>

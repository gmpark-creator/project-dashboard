<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="0.5" stop-color="#0d2233"/>
      <stop offset="1" stop-color="#123036"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.3" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.78" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.55" cy="0.18" r="0.4">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="800" fill="url(#sky)"/>
  <rect width="1600" height="800" fill="url(#glowA)"/>
  <rect width="1600" height="800" fill="url(#glowB)"/>
  <rect width="1600" height="800" fill="url(#glowC)"/>

  <!-- 흐르는 전력선(catenary) -->
  <g fill="none" stroke="#5eb6d6" stroke-opacity="0.10" stroke-width="2">
    <path d="M -50 230 Q 400 320 800 250 T 1650 280"/>
    <path d="M -50 300 Q 400 400 800 330 T 1650 360"/>
    <path d="M -50 520 Q 400 600 800 540 T 1650 560"/>
    <path d="M -50 590 Q 400 670 800 610 T 1650 630"/>
  </g>
  <g fill="none" stroke="#f0b86b" stroke-opacity="0.07" stroke-width="2">
    <path d="M -50 160 Q 500 110 1000 180 T 1650 150"/>
    <path d="M -50 680 Q 500 740 1000 690 T 1650 720"/>
  </g>

  <!-- 미세 격자(grid) -->
  <g stroke="#9fc4d6" stroke-opacity="0.045" stroke-width="1">
    <path d="M0 0V800M200 0V800M400 0V800M600 0V800M800 0V800M1000 0V800M1200 0V800M1400 0V800M1600 0V800"/>
    <path d="M0 0H1600M0 160H1600M0 320H1600M0 480H1600M0 640H1600M0 800H1600"/>
  </g>

  <!-- 송전탑 실루엣(하단) -->
  <g fill="none" stroke="#7d8aa0" stroke-opacity="0.16" stroke-width="2.4" stroke-linejoin="round">
    <g transform="translate(250 470)">
      <path d="M0 0 L-26 200 M0 0 L26 200 M-13 100 H13 M-19 150 H19 M-40 40 H40 M-52 80 H52 M0 0 V-26"/>
    </g>
    <g transform="translate(820 440)">
      <path d="M0 0 L-30 230 M0 0 L30 230 M-15 115 H15 M-22 172 H22 M-46 46 H46 M-60 92 H60 M0 0 V-30"/>
    </g>
    <g transform="translate(1330 480)">
      <path d="M0 0 L-24 190 M0 0 L24 190 M-12 95 H12 M-18 142 H18 M-38 38 H38 M-50 76 H50 M0 0 V-24"/>
    </g>
  </g>

  <!-- 보케 빛점 -->
  <g fill="#cfe8f2">
    <circle cx="180" cy="180" r="2.2" opacity="0.4"/>
    <circle cx="640" cy="120" r="1.8" opacity="0.32"/>
    <circle cx="1120" cy="220" r="2.6" opacity="0.36"/>
    <circle cx="1420" cy="140" r="1.6" opacity="0.28"/>
    <circle cx="420" cy="640" r="2.2" opacity="0.3"/>
    <circle cx="980" cy="700" r="1.8" opacity="0.26"/>
    <circle cx="1300" cy="620" r="2.4" opacity="0.32"/>
  </g>
</svg>

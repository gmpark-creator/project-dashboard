// ===== 헬퍼 =====
const $ = s => document.querySelector(s);
function parseD(s) { return new Date(s + 'T00:00:00'); }
function fmtD(s) {
  const d = parseD(s);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function durationText(a, b) {
  const days = Math.round((parseD(b) - parseD(a)) / 86400000);
  if (days < 1) return '1일';
  if (days < 31) return days + '일';
  const m = Math.round(days / 30.44);
  return m < 12 ? '약 ' + m + '개월' : '약 ' + (days/365.25).toFixed(1) + '년';
}
function stackIcon(t) {
  const s = t.toLowerCase();
  if (/three|webgl|3d/.test(s)) return 'box';
  if (/electron/.test(s)) return 'app-window';
  if (/next|react/.test(s)) return 'atom';
  if (/vercel|github|pages|배포/.test(s)) return 'git-branch';
  if (/script|html|css|type/.test(s)) return 'code';
  if (/python/.test(s)) return 'terminal';
  if (/leaflet|map|지도/.test(s)) return 'map';
  if (/ai|모델|파이프/.test(s)) return 'cpu';
  if (/영상|video/.test(s)) return 'film';
  return 'box';
}

    <button data-id="${p.id}"
      class="proj-btn group w-full text-left rounded-xl p-3 flex items-center gap-3 transition-all duration-200
             ${on ? 'bg-indigo-50 ring-1 ring-indigo-200 shadow-sm'
                  : 'hover:bg-slate-100'}">
      <div class="grid place-items-center w-10 h-10 rounded-lg shrink-0 transition-colors
                  ${on ? 'bg-indigo-500 text-white shadow-md shadow-indigo-300/50'
                       : 'bg-slate-100 text-slate-500 group-hover:text-slate-700'}">
        <i data-lucide="${p.icon}" class="w-5 h-5"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-[13px] font-semibold truncate ${on ? 'text-indigo-900' : 'text-slate-700'}">${p.name}</p>
        <p class="text-[11px] text-slate-400 truncate">${p.subtitle}</p>
      </div>
      <span class="w-2 h-2 rounded-full shrink-0 ${st.dot}"></span>
    </button>`;
  }).join('');
  $('#projList').querySelectorAll('.proj-btn').forEach(b =>
    b.addEventListener('click', () => selectProject(b.dataset.id)));
}
function renderSummary() {
  const cnt = { completed:0, 'in-progress':0, paused:0 };
  PROJECTS.forEach(p => cnt[p.status]++);
  const cell = (n, label, color) => `
    <div class="rounded-lg bg-slate-50 ring-1 ring-slate-200 px-2 py-2.5 text-center">
      <div class="text-lg font-extrabold ${color}">${n}</div>
      <div class="text-[10px] text-slate-400 mt-0.5">${label}</div>
    </div>`;
  $('#summary').innerHTML =
    cell(cnt.completed,'완성','text-emerald-600') +
    cell(cnt['in-progress'],'진행 중','text-amber-600') +
    cell(cnt.paused,'보류','text-violet-600');
}

// ===== 결과물 미리보기 =====
function resultBlock(p) {
  const pv = p.preview;
  if (!pv) return '';
  let body, note;
  if (pv.type === 'embed') {
    const multi = pv.items.length > 1;
    const h = pv.height || (multi ? 380 : 460);
    body = pv.items.map(it => `
      <div class="mb-5 last:mb-0">
        ${multi ? `<div class="flex items-center gap-1.5 mb-2 text-[12.5px] font-bold text-slate-700">
          <i data-lucide="globe" class="w-4 h-4 text-indigo-500"></i>${it.label}</div>` : ''}
        <div class="rounded-xl overflow-hidden ring-1 ring-slate-200 bg-slate-900">
          <iframe src="${it.url}" loading="lazy" title="${it.label}"
                  class="w-full block" style="height:${h}px;border:0"></iframe>
        </div>
        <a href="${it.url}" target="_blank" rel="noopener"
           class="inline-flex items-center gap-1.5 mt-2 text-[12px] font-semibold text-indigo-600 hover:text-indigo-500">
          <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i>새 탭에서 열기 — ${it.url}</a>
      </div>`).join('');
    note = '웹 앱이라 보고서 페이지 안에서 바로 실행됩니다.';
  } else {
    body = `<div class="grid sm:grid-cols-2 gap-4">` + pv.items.map(it => {
      const fname = it.src.split('/').pop();
      return `
      <figure class="rounded-xl overflow-hidden ring-1 ring-slate-200 bg-slate-50">
        <img src="${it.src}" alt="${it.label}" class="w-full block bg-slate-100"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none" class="flex-col items-center justify-center gap-2 h-48 text-center px-5">
          <i data-lucide="image-plus" class="w-7 h-7 text-slate-300"></i>
          <p class="text-[11.5px] text-slate-400 leading-relaxed">
            스크린샷 대기 중 — <code class="text-slate-500 text-[10.5px]">previews/${fname}</code><br>
            이 파일명으로 저장하면 여기에 자동 표시됩니다</p>
        </div>
        <figcaption class="px-3 py-2 text-[12px] font-semibold text-slate-600 bg-white border-t border-slate-200
                           flex items-center gap-1.5">
          <i data-lucide="image" class="w-3.5 h-3.5 text-indigo-500"></i>${it.label}</figcaption>
      </figure>`;
    }).join('') + `</div>`;
    note = '개발용 앱이라 실행 화면 스크린샷으로 표시합니다.';
  }
  return `
    <section class="reveal mt-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" style="animation-delay:170ms">
      <div class="flex items-center gap-2.5 mb-1">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600">
          <i data-lucide="monitor-play" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-800">결과물 미리보기</h3>
      </div>
      <p class="text-[11.5px] text-slate-400 mb-4 ml-[42px]">${note}</p>
      ${body}
    </section>`;
}

// ===== 상세 패널 =====
function renderDetail(p) {
  const st = STATUS[p.status];
  const span = Math.max(1, parseD(p.latest) - parseD(p.start));

  const dots = p.milestones.map(m => {
    const f = Math.min(100, Math.max(0, (parseD(m.date) - parseD(p.start)) / span * 100));
    return `<div class="absolute -top-[7px] w-4 h-4 rounded-full bg-white ring-2 ring-slate-300
                 hover:ring-indigo-400 hover:scale-125 transition-all cursor-default shadow-sm"
                 style="left:calc(${f}% - 8px)" title="${m.date} · ${m.title}"></div>`;
  }).join('');

  const stack = p.stack.map(t => `
    <span class="inline-flex items-center gap-1.5 rounded-lg bg-slate-50 ring-1 ring-slate-200
                 px-2.5 py-1.5 text-[12px] text-slate-600 font-medium">
      <i data-lucide="${stackIcon(t)}" class="w-3.5 h-3.5 text-indigo-500"></i>${t}
    </span>`).join('');

  const issues = p.issues.map(it => {
    const m = ITYPE[it.type];
    return `
    <div class="flex gap-3.5 rounded-xl bg-slate-50/80 ring-1 ring-slate-200 p-3.5">
      <span class="grid place-items-center w-9 h-9 rounded-lg shrink-0 ring-1 ${m.cls}">
        <i data-lucide="${m.icon}" class="w-[18px] h-[18px]"></i>
      </span>
      <div class="min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-[10.5px] font-bold px-1.5 py-0.5 rounded ring-1 ${m.cls}">${it.type}</span>
          <p class="text-[13px] font-semibold text-slate-800">${it.title}</p>
        </div>
        <p class="text-[12px] text-slate-500 mt-1 leading-relaxed">${it.desc}</p>
      </div>
    </div>`;
  }).join('');

  const timeline = p.milestones.map((m, i) => {
    const last = i === p.milestones.length - 1;
    return `
    <div class="relative pl-8 ${last ? '' : 'pb-5'}">
      ${last ? '' : '<div class="absolute left-[7px] top-4 bottom-0 w-px bg-slate-200"></div>'}
      <div class="absolute left-0 top-1 w-3.5 h-3.5 rounded-full bg-gradient-to-br ${st.bar} ring-4 ring-white shadow"></div>
      <p class="text-[11px] font-semibold text-indigo-600">${fmtD(m.date)}</p>
      <p class="text-[13.5px] font-semibold text-slate-800 mt-0.5">${m.title}</p>
      <p class="text-[12px] text-slate-500 mt-0.5">${m.desc}</p>
    </div>`;
  }).join('');

  const versionsBlock = p.versions ? `
    <section class="reveal lg:col-span-2 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm
             hover:shadow-md transition-shadow" style="animation-delay:350ms">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600">
          <i data-lucide="layers-3" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-800">운영 버전</h3>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">
        ${p.versions.map(v => `
          <div class="rounded-xl bg-slate-50/80 ring-1 ring-slate-200 p-4">
            <div class="flex items-center gap-2">
              <i data-lucide="git-fork" class="w-4 h-4 text-indigo-500"></i>
              <p class="text-[13px] font-bold text-slate-800">${v.name}</p>
            </div>
            <p class="text-[12px] text-slate-500 mt-1.5 leading-relaxed">${v.desc}</p>
          </div>`).join('')}
      </div>
    </section>` : '';

  const directorBlock = p.directorNote ? `
    <section class="reveal mt-7 rounded-2xl border border-violet-200 border-l-4 border-l-violet-500
             bg-violet-50/60 p-6 shadow-sm" style="animation-delay:60ms">
      <div class="flex items-center gap-2.5 mb-3">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-violet-100 text-violet-600">
          <i data-lucide="gavel" class="w-[18px] h-[18px]"></i></span>
        <div>
          <h3 class="text-[14px] font-bold text-slate-800">디렉터 총평 · 개발 잠정 보류</h3>
          <p class="text-[11px] text-slate-500">개발자 디렉터 ${p.directorNote.author} · ${fmtD(p.directorNote.date)}</p>

  const chip = (icon, label, val) => `
    <div class="flex items-center gap-2.5 rounded-xl bg-white ring-1 ring-slate-200 px-3.5 py-2.5 shadow-sm">
      <i data-lucide="${icon}" class="w-4 h-4 text-indigo-500"></i>

    </div>`;

  const card = (icon, title, body, delay, span2) => `
    <section class="reveal ${span2 ? 'lg:col-span-2' : ''} rounded-2xl border border-slate-200 bg-white
             p-6 shadow-sm hover:shadow-md transition-shadow" style="animation-delay:${delay}ms">

      </div>${body}

  $('#detail').innerHTML = `

      <div class="flex items-start gap-5 flex-wrap">
        <div class="grid place-items-center w-16 h-16 rounded-2xl bg-gradient-to-br ${st.bar} shadow-lg shadow-slate-300/60">

          <div class="flex items-center gap-2.5 flex-wrap">
            <h2 class="text-[26px] font-extrabold text-slate-900 leading-tight">${p.name}</h2>
            <span class="inline-flex items-center gap-1.5 text-[12px] font-bold px-2.5 py-1 rounded-full ${st.badge}">
              <span class="w-1.5 h-1.5 rounded-full ${st.dot}"></span>${st.label} · ${st.en}
            </span>
          </div>
          <div class="flex items-center gap-2 flex-wrap mt-1.5">
            <p class="text-[13.5px] text-slate-500">${p.subtitle}</p>
            <span class="inline-flex items-center gap-1 text-[11px] text-slate-500 bg-slate-100 ring-1 ring-slate-200
                         rounded-full px-2 py-0.5">

      </div>
      <p class="text-[13.5px] text-slate-600 leading-relaxed mt-5 max-w-3xl">${p.summary}</p>
    </header>

    ${directorBlock}

    <!-- 가로형 타임라인 바 -->
    <section class="reveal mt-7 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" style="animation-delay:80ms">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-[13px] font-bold text-slate-700 flex items-center gap-2">
          <i data-lucide="git-commit-horizontal" class="w-4 h-4 text-indigo-500"></i>진행 타임라인</h3>
        <span class="text-[12px] font-semibold ${st.badge.split(' ')[1]}">진척도 ${p.progress}%</span>
      </div>
      <div class="relative mt-5 mb-1">
        <div class="h-2.5 rounded-full bg-slate-200"></div>
        <div class="growbar absolute top-0 h-2.5 rounded-full bg-gradient-to-r ${st.bar}"
             style="width:${p.progress}%"></div>
        ${dots}
      </div>
      <div class="flex justify-between text-[11.5px] text-slate-400 mt-3">
        <span class="flex items-center gap-1"><i data-lucide="play" class="w-3 h-3"></i>${fmtD(p.start)}</span>
        <span class="flex items-center gap-1">${fmtD(p.latest)}<i data-lucide="flag" class="w-3 h-3"></i></span>
      </div>
    </section>

    <!-- 퀵 스탯 -->
    <div class="reveal grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4" style="animation-delay:140ms">
      ${chip('calendar-clock','진행 기간', durationText(p.start, p.latest))}
      ${chip('milestone','마일스톤', p.milestones.length + '단계')}
      ${chip('layers','기술 스택', p.stack.length + '종')}
      ${chip('activity','현재 상태', st.label)}

    <!-- 결과물 미리보기 -->

      ${card('workflow','진행 방식',

    </p>`;

  lucide.createIcons();
}

  `;
  $('#detail').querySelectorAll('.home-card').forEach(b =>
    b.addEventListener('click', () => selectProject(b.dataset.id)));
}

// ===== 프로젝트 선택 =====
function selectProject(id) {
  activeId = id;
  renderSidebar();
  if (id === 'home') {
    renderHome();
  } else {
    renderDetail(PROJECTS.find(p => p.id === id));
  }
  window.scrollTo({ top:0, behavior:'smooth' });
  lucide.createIcons();
}

// 사이드바 헤더(브랜드) 클릭 → 홈으로
document.getElementById('brandHome').addEventListener('click', () => selectProject('home'));

// ===== 초기화 — 첫 진입은 홈(메인) 페이지 =====
activeId = 'home';
renderSidebar();
renderSummary();
selectProject('home');
lucide.createIcons();
</script>
</body>
</html>

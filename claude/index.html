      { type:'완료', title:'고해상 행성 텍스처 + 주요 위성 시스템 (Claude · 2026-05-24)', desc:'7행성(수성·금성·화성·목성·토성·천왕성·해왕성)에 NASA 출처 디퓨즈·범프 텍스처 적용(jsDelivr/threex.planets). 토성 고리도 실제 색상 텍스처. 주요 위성 11개 추가 — Phobos·Deimos·Io·Europa·Ganymede·Callisto·Titan·Rhea·Titania·Oberon·Triton. parent.group→pivot→mesh 계층으로 행성 이동 자동 추적. 이중 가시성 로직: (A) 행성 포커스 시 그 행성 위성만 fade-in (B) 「🌙 위성」 토글로 전체 동시 표시. opacity 트윈으로 0.25초 부드러운 전환.' },
      { type:'완료', title:'위성 셀렉터 계층화 + 클릭 정보 + 라벨 보정 (Claude · 2026-05-24)', desc:'「초점」 메뉴 위성 11개를 모행성 아래에 「└ 위성명」 형식으로 계층 표시. INFO 객체에 모든 위성의 천문학 정보 등록 — 셀렉터/mesh/라벨 어느 곳을 클릭해도 사이드바에 지름·모행성·공전주기·모행성과 거리·특징·해설이 「달」과 동일하게 표시. 위성 라벨이 본체에서 멀어 보이던 문제 해결 — 라벨 위치를 meshR×1.6 위로, 크기를 meshR×3.2로 본체 비례 산정해 위성에 근접하게 표시. opacity 0인 위성은 raycaster 자동 제외.' },
      { type:'완료', title:'부산 기준 실시간 달 모양 위젯 (Claude · 2026-05-24)', desc:'조석 패널 위에 신설 — Canvas 2D + NASA moon_1024.jpg 텍스처를 globalCompositeOperation 「multiply」로 합성. 표면 디테일(크레이터·바다·고지)을 유지하면서 위상별 그림자만 정확히 변화. 한국어 8단계 위상명 + 조명률(%) + 달 나이 표시.' },
      { type:'완료', title:'조석 기본 지점을 부산으로 (Claude · 2026-05-24)', desc:'curLoc 초기값을 인천 → 부산으로 변경, 셀렉터 selected 속성도 부산. 달 위젯 관측 지점과 일관성 확보.' },
      { type:'핵심', title:'GPT 협업 — 3단 TDZ 에러 진단·해결기록', desc:'2026-05-24 Phase 2 대규모 패치 직후 시뮬레이터 검은 화면 다운. Claude(나)가 첫 에러만 잡고 캐시 의심에 빠져 헛수고하던 중 GPT가 정확히 진단 — JavaScript TDZ(Temporal Dead Zone) 3단 연쇄. ①1차: buildProbes의 PR.direction.normalize() — Parker/JWST는 direction 필드 없는데 호출. Claude가 if 가드로 해결. ②2차 (GPT 진단): const moonSphereGeo가 line 1703 선언인데 line 1233 카모오알레와에서 먼저 참조 → unitGeo·earthGeo·moonSphereGeo 세 공용 geometry를 신규 코드 위로 이동. ③3차 (GPT 재진단): 화성 로버 즉시 실행 for문이 bodyObjs 선언 전 실행 → buildMarsRovers() 함수로 감싸고 PLANETS 빌드 후 호출. 3단 모두 해결 후 정상 복귀. AI 협업의 모범 사례 — Claude는 구현, GPT는 정밀 진단.' }

      { date:'2026-05-22', title:'AI 협업 체제 전환 — Claude 단일 구현 라인 + Codex 디버깅 서포트', desc:'프론트엔드 비주얼 우위로 Claude 일원화, Codex는 코드 진단 서포트로 역할 분담' },

      { date:'2026-05-24', title:'NASA/Gaia DR3 팩트체크 정밀화', desc:'40 에리다니 A 16.45 → 16.340 ly(Gaia DR3), α Cen 4.37 → 4.344 ly. 카이퍼 영역에 NASA 분류상 산란 원반(Scattered Disk, 50~1,000 AU) 입자·윤곽 추가. 데이터 정확도 97% → ~99.5%' },
      { date:'2026-05-24', title:'고해상 행성 텍스처 + 위성 시스템', desc:'7행성에 NASA 출처 디퓨즈·범프 텍스처(jsDelivr/threex.planets) 적용. 주요 위성 11개 추가 — 화성(포보스·데이모스), 목성(갈릴레오 4), 토성(타이탄·레아), 천왕성(티타니아·오베론), 해왕성(트리톤). 부모-자식 계층(planet→pivot→moon), 가시성 이중 로직(focus 자동 표시 + 「🌙 위성」 전역 토글), opacity 페이드 트윈.' },
      { date:'2026-05-24', title:'위성 셀렉터 계층화 + 클릭 정보 + 라벨 보정', desc:'「초점」 셀렉터에 행성 아래 위성 들여쓰기 (└ 표기). 위성 11개 모두 INFO 등록 — 셀렉터 또는 mesh/라벨 직접 클릭 시 사이드바에 천문학 정보 표시(지름·공전주기·모행성 거리·특징·설명). 위성 라벨 위치/크기를 mesh 본체 크기 비례로 재산정(meshR×1.6 위, meshR×3.2 크기), 본체에 근접하게 표시. 보이지 않는 위성은 raycaster에서 자동 제외.' },
      { date:'2026-05-24', title:'인류 탐사선·라그랑주·공궤도·성간/미지 천체 통합 레이어', desc:'대규모 천체 추가 — 보이저 1·2호(169·141 AU), 뉴 호라이즌스호(58 AU), 파커 솔라 프로브(코로나 타원 궤도), JWST(L2). 지구-태양 라그랑주 L1~L5 매 프레임 동적 갱신(홀로그래픽 십자 마커). 목성 트로이 소행성군 2,400 입자×2(L4·L5). 카모오알레와 1:1 공명 궤도. 오무아무아 쌍곡선 궤도 + 미리 그린 path. Planet Nine 가상 행성 점선 궤도(a=600 AU). 「🛰 탐사선」「⚖ 라그랑주」「👽 미지」 3개 UI 토글로 카테고리별 표시. 셀렉터 구분자(──)로 그룹화.' },
      { date:'2026-05-24', title:'Phase 1 정리 — 화성 로버 제거 + 라그랑주/JWST 가시성 강화', desc:'디렉터님 지시로 화성 로버(퍼서비어런스·큐리오시티) 데이터·코드·셀렉터 완전 제거. 라그랑주 L1~L5 마커에 depthTest:false + renderOrder 999 적용해 지구 뒤에 있어도 가려지지 않음. sprite 크기 50% 강화로 멀리서도 명확. JWST는 황금 6각형 CylinderGeometry mesh + 진한 halo sprite로 차별화된 3D 마커 적용, 천천히 자전.' },
      { date:'2026-05-24', title:'Phase 2 — 인터스텔라 영화 시스템 (가르강튀아 GLSL + 웜홀 + 3행성)', desc:'영화 「인터스텔라」 시스템 통합 추가. 가르강튀아 초대질량 블랙홀: Event Horizon(검은 구) + 커스텀 GLSL Accretion Disk(케플러 회전·fBm 플라즈마 노이즈·Doppler 빔잉) + 위·아래 휘어진 Lensing Halo Torus(영화 시그니처) — 모두 GLSL ShaderMaterial로 실시간 렌더. 웜홀(토성 근처 발광 sphere, 홀로그래픽 격자 셰이더). 가르강튀아 주위 공전하는 3행성: 밀러(물·시간 지연 1시간=지구 7년) · 맨(얼음·거짓 신호) · 에드먼즈(사막·거주가능). 셀렉터 「🎬 인터스텔라 영화 시스템」 섹션 신설, 「👽 미지」 토글에 통합. 카메라 far 1.2e6까지 동적 확장.' },
      { isCore:true, date:'2026-05-24', title:'핵심 디버깅 스토리 — GPT 협업으로 3단 TDZ 에러 해결', desc:'Phase 2 대규모 패치(인터스텔라 시스템) 직후 시뮬레이터가 검은 화면 + 「실행에 실패했습니다」로 완전 다운. Claude(나)가 첫 에러만 잡고 캐시 의심으로 빠져 헛수고하던 중, GPT가 정확히 진단 — JavaScript의 TDZ(Temporal Dead Zone, const 선언 전 접근 불가) 문제가 3단으로 누적돼 있었음. (1차) buildProbes 안 PR.direction.normalize() — Parker/JWST가 direction 필드 없는데 호출 → 「Cannot read properties of undefined」. Claude가 if 가드로 1차 해결. (2차) GPT 진단: const moonSphereGeo가 line 1703에 선언됐는데 line 1233 카모오알레와에서 먼저 참조 → 「Cannot access before initialization」. unitGeo·earthGeo·moonSphereGeo 세 공용 geometry를 신규 코드 블록 시작 위로 이동해 해결. (3차) GPT 재진단: 화성 로버 즉시 실행 for문이 bodyObjs 선언 전 실행되어 「Cannot access bodyObjs before initialization」. 로버 빌드 코드를 buildMarsRovers() 함수로 감싸고 PLANETS 빌드 직후 호출하도록 재구조. 3단 모두 해결 후 시뮬레이터 정상 동작 복귀. 캐시 진단용 [BUILD-vN-FIX] 마커를 로딩 화면에 임시 표시했다가 해결 후 제거. AI 협업의 모범 사례 — 각 AI 강점 활용.' },
      { date:'2026-05-24', title:'Phase 3a — 「외계 항성계」 메뉴 재편 + 가르강튀아 셰이더 강화', desc:'디렉터님 지시 사양 반영: 셀렉터의 외계 항성계 항목을 「외계 항성계」 메인 카테고리 + 3개 optgroup 서브로 재편 — (1) 인터스텔라(웜홀·가르강튀아·밀러·맨·에드먼즈) (2) 삼체(알파 센타우리) (3) 프로젝트 헤일메리(40 에리다니 A). 가르강튀아 강착원반 셰이더 강화: view-dependent UV warp(카메라가 옆에서 볼수록 디스크가 휘어 보임) + 6단계 fBm 노이즈 + Einstein Ring 추가(가장 안쪽 강한 빛) + Doppler 청색편이 강화(밝은 쪽에 청색 가산) + 초고온 안쪽 청백색 그라데이션.' },
      { date:'2026-05-24', title:'Phase 3b — 목성 트로이 영역 시각화 (선택 시 바운딩)', desc:'디렉터님 지시: 「목성 트로이 소행성군」 선택 시 시각적으로 범위를 표현. L4(그리스 진영, 황갈색)·L5(트로이 진영, 연보라색) 위치에 60° 반폭의 반투명 호 + 외곽 LineLoop + 라벨 두 개(그리스 진영/트로이 진영). 입자 분포와 동일한 baseAng/회전 보정 사용해 입자와 정확히 겹침. 셀렉터 「목성 트로이 소행성군」 선택 시에만 표시(다른 선택 시 자동 숨김). 카메라는 목성 거리의 1.8배에서 호 전체 조망.' },
      { date:'2026-05-24', title:'Phase 3c — 「사건의 지평선 (과학적 실증)」 EHT 블랙홀 신규', desc:'디렉터님 지시: 가르강튀아(영화)와 별개로 EHT 관측 기반 두 번째 블랙홀 추가. M87* 발표(2019-04) 사진의 톤을 모티브 — 따뜻한 오렌지 ring + Photon Ring 강조(가장 안쪽 가는 빛) + 약한 Doppler(30% 비대칭, 가르강튀아 7배의 1/20) + view-warp 없음(정면 관측 사진 그대로) + 4단계 fBm 부드러운 노이즈. 가르강튀아와 완전 별도 GLSL ShaderMaterial. INFO에 EHT 협력단·M87*·관측 방식·VLBI 8개 망원경·Sgr A* 후속 등 천문학 사실 등록. 셀렉터 「⚫ 블랙홀」 카테고리 신설. 위치 (400000, -50000, 200000) — 가르강튀아와 별도 좌표.' },
      { date:'2026-05-24', title:'Phase 4 — 위성 PBR 텍스처 절충 적용', desc:'디렉터님 지시: 위성을 평면 sphere가 아닌 PBR 텍스처로 강화. 무료 CDN 위성 전용 텍스처가 사실상 없어(검색: jeromeetienne/threex.planets·solarsystemscope.com 모두 행성·달·명왕성만 제공) 절충안 적용 — NASA 달 텍스처(moon_1024.jpg)를 map+bumpMap으로 공유 + 위성별 color tint로 고유 색감(이오 노란·유로파 흰·가니메데 갈색·칼리스토 어두운회·타이탄 오렌지 등). bumpScale은 포보스/데이모스 같은 작은 위성에 더 강하게(0.05), 큰 위성은 약하게(0.022). 진짜 위성별 PBR은 디렉터님이 NASA 텍스처를 직접 폴더에 제공해주시면 즉시 적용 가능.' },

// ===== 헬퍼 =====
const $ = s => document.querySelector(s);
function parseD(s) { return new Date(s + 'T00:00:00'); }
function fmtD(s) {
  const d = parseD(s);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function durationText(a, b) {
  const days = Math.round((parseD(b) - parseD(a)) / 86400000);
  if (days < 1) return '1일';
  if (days < 31) return days + '일';
  const m = Math.round(days / 30.44);
  return m < 12 ? '약 ' + m + '개월' : '약 ' + (days/365.25).toFixed(1) + '년';
}
function stackIcon(t) {
  const s = t.toLowerCase();
  if (/three|webgl|3d/.test(s)) return 'box';
  if (/electron/.test(s)) return 'app-window';
  if (/next|react/.test(s)) return 'atom';
  if (/vercel|github|pages|배포/.test(s)) return 'git-branch';
  if (/script|html|css|type/.test(s)) return 'code';
  if (/python/.test(s)) return 'terminal';
  if (/leaflet|map|지도/.test(s)) return 'map';
  if (/ai|모델|파이프/.test(s)) return 'cpu';
  if (/영상|video/.test(s)) return 'film';
  return 'box';
}

                           flex items-center gap-1.5">
          <i data-lucide="image" class="w-3.5 h-3.5 text-indigo-500"></i>${it.label}</figcaption>
      </figure>`;
    }).join('') + `</div>`;
    note = '개발용 앱이라 실행 화면 스크린샷으로 표시합니다.';
  }
  return `
    <section class="reveal mt-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" style="animation-delay:170ms">
      <div class="flex items-center gap-2.5 mb-1">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600">
          <i data-lucide="monitor-play" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-800">결과물 미리보기</h3>
      </div>
      <p class="text-[11.5px] text-slate-400 mb-4 ml-[42px]">${note}</p>
      ${body}
    </section>`;
}

// ===== 상세 패널 =====
function renderDetail(p) {
  const st = STATUS[p.status];
  const span = Math.max(1, parseD(p.latest) - parseD(p.start));

  const dots = p.milestones.map(m => {
    const f = Math.min(100, Math.max(0, (parseD(m.date) - parseD(p.start)) / span * 100));
    return `<div class="absolute -top-[7px] w-4 h-4 rounded-full bg-white ring-2 ring-slate-300
                 hover:ring-indigo-400 hover:scale-125 transition-all cursor-default shadow-sm"
                 style="left:calc(${f}% - 8px)" title="${m.date} · ${m.title}"></div>`;
  }).join('');

  const stack = p.stack.map(t => `
    <span class="inline-flex items-center gap-1.5 rounded-lg bg-slate-50 ring-1 ring-slate-200
                 px-2.5 py-1.5 text-[12px] text-slate-600 font-medium">
      <i data-lucide="${stackIcon(t)}" class="w-3.5 h-3.5 text-indigo-500"></i>${t}
    </span>`).join('');

  const issues = p.issues.map(it => {
    const m = ITYPE[it.type];
    const isCore = it.type === '핵심';
    // 「핵심」 타입: 분홍·푸시아 그라데이션 박스 + 진한 ring + 그림자 — 시각적으로 두드러지게
    const boxCls = isCore
      ? 'flex gap-3.5 rounded-xl bg-gradient-to-br from-fuchsia-50 via-pink-50 to-rose-50 ring-2 ring-fuchsia-300 p-4 shadow-md shadow-fuchsia-200/40'
      : 'flex gap-3.5 rounded-xl bg-slate-50/80 ring-1 ring-slate-200 p-3.5';
    const iconBoxCls = isCore
      ? 'grid place-items-center w-10 h-10 rounded-lg shrink-0 ring-2 ring-fuchsia-300 bg-white shadow-sm'
      : `grid place-items-center w-9 h-9 rounded-lg shrink-0 ring-1 ${m.cls}`;
    const iconCls = isCore
      ? 'w-[20px] h-[20px] text-fuchsia-600'
      : 'w-[18px] h-[18px]';
    const titleCls = isCore
      ? 'text-[13.5px] font-extrabold text-fuchsia-900'
      : 'text-[13px] font-semibold text-slate-800';
    const descCls = isCore
      ? 'text-[12px] text-fuchsia-800/85 mt-1.5 leading-relaxed'
      : 'text-[12px] text-slate-500 mt-1 leading-relaxed';
    const badgeCls = isCore
      ? 'text-[10.5px] font-bold px-2 py-0.5 rounded-md ring-1 bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white border-0'
      : `text-[10.5px] font-bold px-1.5 py-0.5 rounded ring-1 ${m.cls}`;
    // 「핵심」 타입도 배지 텍스트는 「완료」로 표시 (디렉터님 지시: 색감만 다르게 구분)
    const badgeText = isCore ? '완료' : it.type;
    return `
    <div class="${boxCls}">
      <span class="${iconBoxCls}">
        <i data-lucide="${m.icon}" class="${iconCls}"></i>
      </span>
      <div class="min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="${badgeCls}">${badgeText}</span>
          <p class="${titleCls}">${it.title}</p>
        </div>
        <p class="${descCls}">${it.desc}</p>
      </div>
    </div>`;
  }).join('');

  const timeline = p.milestones.map((m, i) => {
    const last = i === p.milestones.length - 1;
    // 「핵심」 마일스톤은 그라데이션 dot + fuchsia 색감으로 구분
    const isCore = m.isCore === true;
    const dotCls = isCore
      ? 'absolute left-0 top-1 w-4 h-4 -ml-[1px] rounded-full bg-gradient-to-br from-fuchsia-500 via-pink-500 to-rose-500 ring-4 ring-fuchsia-100 shadow-lg shadow-fuchsia-300/60'
      : `absolute left-0 top-1 w-3.5 h-3.5 rounded-full bg-gradient-to-br ${st.bar} ring-4 ring-white shadow`;
    const dateCls  = isCore ? 'text-[11px] font-bold text-fuchsia-600' : 'text-[11px] font-semibold text-indigo-600';
    const titleCls = isCore ? 'text-[13.5px] font-extrabold text-fuchsia-900 mt-0.5' : 'text-[13.5px] font-semibold text-slate-800 mt-0.5';
    const descCls  = isCore ? 'text-[12px] text-fuchsia-800/85 mt-0.5 leading-relaxed' : 'text-[12px] text-slate-500 mt-0.5';
    return `
    <div class="relative pl-8 ${last ? '' : 'pb-5'}">
      ${last ? '' : '<div class="absolute left-[7px] top-4 bottom-0 w-px bg-slate-200"></div>'}
      <div class="${dotCls}"></div>
      <p class="${dateCls}">${fmtD(m.date)}</p>
      <p class="${titleCls}">${m.title}</p>
      <p class="${descCls}">${m.desc}</p>
    </div>`;
  }).join('');

  const versionsBlock = p.versions ? `
    <section class="reveal lg:col-span-2 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm
             hover:shadow-md transition-shadow" style="animation-delay:350ms">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600">
          <i data-lucide="layers-3" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-800">운영 버전</h3>
      </div>
      <div class="grid sm:grid-cols-2 gap-3">
        ${p.versions.map(v => `
          <div class="rounded-xl bg-slate-50/80 ring-1 ring-slate-200 p-4">
            <div class="flex items-center gap-2">
              <i data-lucide="git-fork" class="w-4 h-4 text-indigo-500"></i>
              <p class="text-[13px] font-bold text-slate-800">${v.name}</p>
            </div>
            <p class="text-[12px] text-slate-500 mt-1.5 leading-relaxed">${v.desc}</p>
          </div>`).join('')}
      </div>
    </section>` : '';

  const directorBlock = p.directorNote ? `
    <section class="reveal mt-7 rounded-2xl border border-violet-200 border-l-4 border-l-violet-500
             bg-violet-50/60 p-6 shadow-sm" style="animation-delay:60ms">
      <div class="flex items-center gap-2.5 mb-3">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-violet-100 text-violet-600">
          <i data-lucide="gavel" class="w-[18px] h-[18px]"></i></span>
        <div>
          <h3 class="text-[14px] font-bold text-slate-800">디렉터 총평 · 개발 잠정 보류</h3>
          <p class="text-[11px] text-slate-500">개발자 디렉터 ${p.directorNote.author} · ${fmtD(p.directorNote.date)}</p>
        </div>
      </div>
      <p class="text-[13px] text-slate-700 leading-relaxed">${p.directorNote.text}</p>
    </section>` : '';

  const chip = (icon, label, val) => `
    <div class="flex items-center gap-2.5 rounded-xl bg-white ring-1 ring-slate-200 px-3.5 py-2.5 shadow-sm">
      <i data-lucide="${icon}" class="w-4 h-4 text-indigo-500"></i>
      <div><p class="text-[10px] text-slate-400 leading-none">${label}</p>
        <p class="text-[13px] font-semibold text-slate-800 mt-1">${val}</p></div>
    </div>`;

  const card = (icon, title, body, delay, span2) => `
    <section class="reveal ${span2 ? 'lg:col-span-2' : ''} rounded-2xl border border-slate-200 bg-white
             p-6 shadow-sm hover:shadow-md transition-shadow" style="animation-delay:${delay}ms">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600">
          <i data-lucide="${icon}" class="w-[18px] h-[18px]"></i></span>
        <h3 class="text-[14px] font-bold text-slate-800">${title}</h3>
      </div>${body}
    </section>`;

  $('#detail').innerHTML = `
    <!-- 히어로 -->
    <header class="reveal" style="animation-delay:0ms">
      <div class="flex items-start gap-5 flex-wrap">
        <div class="grid place-items-center w-16 h-16 rounded-2xl bg-gradient-to-br ${st.bar} shadow-lg shadow-slate-300/60">
          <i data-lucide="${p.icon}" class="w-8 h-8 text-white"></i>
        </div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2.5 flex-wrap">
            <h2 class="text-[26px] font-extrabold text-slate-900 leading-tight">${p.name}</h2>
            <span class="inline-flex items-center gap-1.5 text-[12px] font-bold px-2.5 py-1 rounded-full ${st.badge}">
              <span class="w-1.5 h-1.5 rounded-full ${st.dot}"></span>${st.label} · ${st.en}
            </span>
          </div>
          <div class="flex items-center gap-2 flex-wrap mt-1.5">
            <p class="text-[13.5px] text-slate-500">${p.subtitle}</p>
            <span class="inline-flex items-center gap-1 text-[11px] text-slate-500 bg-slate-100 ring-1 ring-slate-200
                         rounded-full px-2 py-0.5">
              <i data-lucide="monitor" class="w-3 h-3"></i>${p.platform}</span>
          </div>
        </div>
        ${p.link ? `<a href="${p.link}" target="_blank" rel="noopener"
          class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition-colors
                 px-4 py-2.5 text-[13px] font-semibold text-white shadow-lg shadow-indigo-300/50">
          <i data-lucide="external-link" class="w-4 h-4"></i>라이브 보기</a>` : ''}
      </div>
      <p class="text-[13.5px] text-slate-600 leading-relaxed mt-5 max-w-3xl">${p.summary}</p>
    </header>

    ${directorBlock}

    <!-- 가로형 타임라인 바 -->
    <section class="reveal mt-7 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" style="animation-delay:80ms">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-[13px] font-bold text-slate-700 flex items-center gap-2">
          <i data-lucide="git-commit-horizontal" class="w-4 h-4 text-indigo-500"></i>진행 타임라인</h3>
        <span class="text-[12px] font-semibold ${st.badge.split(' ')[1]}">진척도 ${p.progress}%</span>
      </div>
      <div class="relative mt-5 mb-1">
        <div class="h-2.5 rounded-full bg-slate-200"></div>
        <div class="growbar absolute top-0 h-2.5 rounded-full bg-gradient-to-r ${st.bar}"
             style="width:${p.progress}%"></div>
        ${dots}
      </div>
      <div class="flex justify-between text-[11.5px] text-slate-400 mt-3">
        <span class="flex items-center gap-1"><i data-lucide="play" class="w-3 h-3"></i>${fmtD(p.start)}</span>
        <span class="flex items-center gap-1">${fmtD(p.latest)}<i data-lucide="flag" class="w-3 h-3"></i></span>
      </div>
    </section>

    <!-- 퀵 스탯 -->
    <div class="reveal grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4" style="animation-delay:140ms">
      ${chip('calendar-clock','진행 기간', durationText(p.start, p.latest))}
      ${chip('milestone','마일스톤', p.milestones.length + '단계')}
      ${chip('layers','기술 스택', p.stack.length + '종')}
      ${chip('activity','현재 상태', st.label)}
    </div>

    <!-- 결과물 미리보기 -->
    ${resultBlock(p)}

    <!-- 카드 그리드 -->
    <div class="grid lg:grid-cols-2 gap-5 mt-5">
      ${card('workflow','진행 방식',
        `<p class="text-[13px] text-slate-600 leading-relaxed">${p.method}</p>`, 200)}
      ${card('layers','기술 스택',
        `<div class="flex flex-wrap gap-2">${stack}</div>`, 260)}
      ${versionsBlock}
      ${card('clipboard-list','핵심 이슈 · 완료 내역',
        `<div class="grid sm:grid-cols-2 gap-3">${issues}</div>`, 320, true)}
      ${card('git-commit-vertical','프로젝트 마일스톤',
        `<div class="mt-1">${timeline}</div>`, 380, true)}
    </div>

    <p class="text-[11px] text-slate-400 text-center mt-8">
      AI 협업 진행 보고서 · GPT × Claude &nbsp;|&nbsp; 데이터는 코드 상단 <code class="text-slate-500">PROJECTS</code> 객체에서 수정
    </p>`;

  lucide.createIcons();
}

// ===== 홈(메인) 페이지 =====
// 디렉터님의 G.M.PARK 프로젝트 대시보드 — 알록달록 그라데이션 헤로 + 컬러풀 프로젝트 카드
// (문구는 디렉터님 후속 지시 대기 — placeholder 영역 유지)
function renderHome() {
  const PROJ_COLORS = {
    'ais':    { grad:'from-emerald-400 via-teal-400 to-cyan-400',     ring:'ring-emerald-200',  text:'text-emerald-700',  pill:'bg-emerald-50' },
    'sports': { grad:'from-violet-400 via-purple-400 to-fuchsia-400', ring:'ring-violet-200',   text:'text-violet-700',   pill:'bg-violet-50' },
    'solar':  { grad:'from-amber-400 via-orange-400 to-rose-400',     ring:'ring-amber-200',    text:'text-amber-700',    pill:'bg-amber-50' },
    'inst':   { grad:'from-sky-400 via-blue-400 to-indigo-400',       ring:'ring-sky-200',      text:'text-sky-700',      pill:'bg-sky-50' }
  };
  const cards = PROJECTS.map((p, i) => {
    const c = PROJ_COLORS[p.id] || PROJ_COLORS.ais;
    const st = STATUS[p.status];
    return `
    <button data-id="${p.id}"
      class="home-card group relative overflow-hidden rounded-3xl p-5 text-left bg-white ring-1 ring-slate-200
             shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 reveal"
      style="animation-delay:${120 + i*70}ms">
      <div class="absolute inset-0 bg-gradient-to-br ${c.grad} opacity-0 group-hover:opacity-10 transition-opacity"></div>
      <div class="absolute -top-12 -right-12 w-36 h-36 rounded-full bg-gradient-to-br ${c.grad} opacity-25 blur-2xl"></div>
      <div class="relative">
        <div class="flex items-center gap-3 mb-3">
          <span class="grid place-items-center w-12 h-12 rounded-2xl bg-gradient-to-br ${c.grad} shadow-lg text-white">
            <i data-lucide="${p.icon}" class="w-6 h-6"></i>
          </span>
          <span class="text-[10.5px] font-bold px-2 py-0.5 rounded-full ${st.badge}">${st.label}</span>
        </div>
        <h3 class="text-[16px] font-extrabold text-slate-900 leading-tight">${p.name}</h3>
        <p class="text-[12px] text-slate-500 mt-1 leading-relaxed">${p.subtitle}</p>
        <div class="mt-4 flex items-center justify-between">
          <span class="text-[11px] font-semibold ${c.text} ${c.pill} px-2 py-1 rounded-md ring-1 ${c.ring}">진행률 ${p.progress}%</span>
          <span class="inline-flex items-center gap-1 text-[12px] font-semibold text-slate-500 group-hover:text-slate-800">
            상세 보기 <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
          </span>
        </div>
      </div>
    </button>`;
  }).join('');

  $('#detail').innerHTML = `
    <!-- ── HERO — HAZE STORY 앰블럼 + 영어 디렉터 명칭 (보라 그라데이션) ── -->
    <section class="reveal relative overflow-hidden rounded-3xl p-10 sm:p-16 mb-7
                    bg-gradient-to-br from-violet-950 via-purple-900 to-indigo-950
                    text-white shadow-2xl shadow-violet-400/30">
      <div class="absolute -top-24 -left-16 w-72 h-72 rounded-full bg-fuchsia-400/15 blur-3xl"></div>
      <div class="absolute -bottom-20 -right-10 w-80 h-80 rounded-full bg-sky-300/12 blur-3xl"></div>
      <div class="absolute top-10 right-12 w-40 h-40 rounded-full bg-rose-300/10 blur-2xl"></div>
      <!-- 가로 레이아웃: 앰블럼 왼쪽 + 3줄 텍스트 오른쪽 (높이 합 = 앰블럼 160px) -->
      <div class="relative flex items-stretch gap-6 sm:gap-8">
        <!-- HAZE STORY 공식 앰블럼 (왼쪽, 160px) -->
        <div class="grid place-items-center w-40 h-40 rounded-3xl bg-white/95 ring-1 ring-white/20 shadow-2xl shadow-fuchsia-300/30 shrink-0">
          <img src="./hazepark-logo.webp" alt="HAZE STORY" class="w-36 h-36 object-contain" />
        </div>
        <!-- 오른쪽 3줄 텍스트 (높이 합 = 앰블럼 160px) -->
        <div class="h-40 flex flex-col justify-between py-1 min-w-0">
          <!-- 1줄: G.M.PARK (작게) -->
          <p class="text-[16px] sm:text-[20px] font-extrabold text-fuchsia-200 leading-none tracking-tight">
            G.M.PARK
          </p>
          <!-- 2줄: Subtitle (작게) -->
          <p class="text-[12px] sm:text-[14px] font-medium text-white/75 leading-none tracking-wide">
            Junior Developer Director at HAZE STORY
          </p>
          <!-- 3줄: Project Dashboard (가장 크게) -->
          <h1 class="text-[42px] sm:text-[64px] font-black leading-none tracking-tight bg-gradient-to-r from-pink-300 via-fuchsia-200 to-violet-200 bg-clip-text text-transparent">
            Project Dashboard
          </h1>
        </div>
      </div>
    </section>

    <!-- ── 프로젝트 카드 그리드 ── -->
    <section class="mb-8">
      <div class="flex items-center gap-2.5 mb-4 reveal">
        <span class="grid place-items-center w-8 h-8 rounded-lg bg-slate-800 text-white">
          <i data-lucide="layout-grid" class="w-[18px] h-[18px]"></i>
        </span>
        <h2 class="text-[16px] font-bold text-slate-800">현재 진행 프로젝트</h2>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">${cards}</div>
    </section>
  `;
  $('#detail').querySelectorAll('.home-card').forEach(b =>
    b.addEventListener('click', () => selectProject(b.dataset.id)));
}

// ===== 프로젝트 선택 =====
function selectProject(id) {
  activeId = id;
  renderSidebar();
  if (id === 'home') {
    renderHome();
  } else {
    renderDetail(PROJECTS.find(p => p.id === id));
  }
  window.scrollTo({ top:0, behavior:'smooth' });
  lucide.createIcons();
}

// 사이드바 헤더(브랜드) 클릭 → 홈으로
document.getElementById('brandHome').addEventListener('click', () => selectProject('home'));

// ===== 초기화 — 첫 진입은 홈(메인) 페이지 =====
activeId = 'home';
renderSidebar();
renderSummary();
selectProject('home');
lucide.createIcons();
</script>
</body>
</html>

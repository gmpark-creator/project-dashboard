<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2D 매치 트래커 — 실측 트래킹 데이터</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body{height:100%;}
  body{background:#0f1320;}
  #timeline{ -webkit-appearance:none; appearance:none; height:8px; border-radius:8px;
    background:#2b3550; outline:none; cursor:pointer; }
  #timeline::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:18px; height:18px;
    border-radius:50%; background:#10b981; border:3px solid #d1fae5; cursor:grab; box-shadow:0 2px 6px #0008; }
  #timeline::-moz-range-thumb{ width:18px;height:18px;border-radius:50%;background:#10b981;border:3px solid #d1fae5; }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#2b3550;border-radius:8px;}
</style>
</head>
<body class="text-slate-200 antialiased overflow-hidden">

<div class="h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="shrink-0 flex items-center justify-between px-5 py-2 bg-[#161b2e] border-b border-slate-800 gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <div class="grid place-items-center w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 shrink-0">
        <span class="text-lg">⚽</span>
      </div>
      <div class="min-w-0">
        <h1 id="mName" class="text-[13px] font-extrabold text-white leading-tight">2D 매치 트래커</h1>
        <p id="mSub" class="text-[10px] text-slate-500 truncate">트래킹 데이터 로딩 중…</p>
      </div>
    </div>
    <div class="flex items-center gap-4 shrink-0">
      <div class="flex items-center gap-2 text-[14px] font-bold">
        <span class="text-[#e23b3b]">홈</span>
        <span id="score" class="px-2.5 py-0.5 rounded-md bg-slate-800 text-white tabular-nums">0 : 0</span>
        <span class="text-[#3667d6]">원정</span>
      </div>
      <div class="text-right w-[112px]">
        <div id="clock" class="text-[15px] font-extrabold text-white tabular-nums leading-none">전반 00:00</div>
        <div class="text-[9px] text-slate-500">경기 시계</div>
      </div>
    </div>
  </header>

  <!-- 본문 -->
  <div class="flex-1 flex min-h-0">
    <div id="pitchWrap" class="flex-1 min-w-0 p-3 relative">
      <canvas id="pitch" class="w-full h-full rounded-xl"></canvas>
      <div id="loading" class="absolute inset-0 grid place-items-center text-slate-400 text-[13px]">
        실측 트래킹 데이터 불러오는 중…
      </div>
    </div>
    <aside class="w-[268px] shrink-0 bg-[#161b2e] border-l border-slate-800 overflow-y-auto p-4">
      <div id="panel"></div>
    </aside>
  </div>

  <!-- 하단 컨트롤 -->
  <footer class="shrink-0 bg-[#161b2e] border-t border-slate-800 px-5 py-2.5">
    <div class="flex items-center gap-3.5">
      <button id="playBtn" class="grid place-items-center w-10 h-10 rounded-full bg-emerald-500
              hover:bg-emerald-400 transition-colors text-white text-base shrink-0">▶</button>
      <div class="flex items-center gap-1 shrink-0">
        <span class="text-[10px] text-slate-500 mr-0.5">배속</span>
        <button data-spd="2"  class="spd px-2 py-1 rounded text-[11px] bg-slate-800">2×</button>
        <button data-spd="6"  class="spd px-2 py-1 rounded text-[11px] bg-emerald-600">6×</button>
        <button data-spd="16" class="spd px-2 py-1 rounded text-[11px] bg-slate-800">16×</button>
        <button data-spd="40" class="spd px-2 py-1 rounded text-[11px] bg-slate-800">40×</button>
      </div>
      <span id="tCur" class="text-[11.5px] text-slate-300 tabular-nums shrink-0 w-24 text-right">전반 00:00</span>
      <div class="relative flex-1">
        <div id="markers" class="absolute -top-2 left-0 right-0 h-0 pointer-events-none"></div>
        <input id="timeline" type="range" min="0" max="100" step="0.4" value="0" class="w-full" />
      </div>
      <span id="tEnd" class="text-[11.5px] text-slate-500 tabular-nums shrink-0">—</span>
    </div>
    <p class="text-[9.5px] text-slate-600 mt-1 ml-[56px]">
      노란 마커 = 실제 득점(클릭 시 전후 10초 재생) · 선수 클릭 = 상세 데이터 · 회색 선 = 하프타임
    </p>
  </footer>
</div>

<script>
/* ============================================================
   2D 매치 트래커 — 실측 트래킹 데이터 재생
   · 데이터: Metrica Sports 공개 샘플 — 실제 경기의 25Hz 광학 트래킹
   · game1.json 을 불러와 2D 경기장에 그대로 재생 (재구성·추정 아님)
   · 프레임 스키마(flat): [t, ballX,ballY, p0x,p0y, p1x,p1y, ...]  결측=null
   ============================================================ */
const PITCH = { L:105, W:68 };
const HOME = '#e23b3b', AWAY = '#3667d6';
const $ = id => document.getElementById(id);

let DATA, NF, DT, TOTAL, P1DUR, PLAYERS, CUM, MAXSPD;
let matchTime = 0, playing = false, speed = 6, selPid = null, replayStop = null, ready = false;

// game1.json 과 같은 폴더에서 불러옴 (배포 환경 기준)
fetch('game1.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(d => { DATA = d; setup(); })
  .catch(err => {
    $('loading').innerHTML = '⚠ game1.json 을 불러오지 못했습니다.<br>'
      + '<span class="text-[11px] text-slate-500">' + err
      + ' — 배포된 주소(https)로 열거나 로컬 서버로 실행하세요.</span>';
  });

function setup(){
  NF = DATA.frames.length;
  DT = DATA.dt;
  TOTAL = DATA.frames[NF-1][0];
  P1DUR = DATA.p1Dur;
  PLAYERS = DATA.players;            // [{team,jersey}] × 28
  PITCH.L = DATA.pitch[0]; PITCH.W = DATA.pitch[1];

  // 누적 이동거리 · 최고 속도 사전계산 (결측 구간은 건너뜀)
  const NP = PLAYERS.length;
  CUM = []; MAXSPD = new Float64Array(NP);
  for (let k=0;k<NP;k++){
    const c = new Float64Array(NF);
    for (let i=1;i<NF;i++){
      const A=DATA.frames[i-1], B=DATA.frames[i], o=3+2*k;
      if (A[o]!=null && B[o]!=null){
        const d=Math.hypot(B[o]-A[o], B[o+1]-A[o+1]);
        c[i]=c[i-1]+d;
        const s=d/DT; if(s<12 && s>MAXSPD[k]) MAXSPD[k]=s;
      } else c[i]=c[i-1];
    }
    CUM.push(c);
  }

  $('mName').textContent = DATA.name;
  $('mSub').textContent = DATA.sub;
  $('tEnd').textContent = clockLabel(TOTAL);
  $('timeline').max = TOTAL;
  $('loading').style.display = 'none';
  ready = true;
  layout(); buildMarkers(); setSpeed(6); renderPanel(); updatePlayBtn();
  requestAnimationFrame(loop);
}

// ===== 보간 / 조회 =====
function getState(mt){
  mt = Math.max(0, Math.min(TOTAL, mt));
  let fi = mt/DT, i0 = Math.floor(fi);
  if (i0 > NF-2) i0 = NF-2;
  const fr = fi-i0, A = DATA.frames[i0], B = DATA.frames[i0+1];
  const L = (a,b)=>a+(b-a)*fr;
  const ball = (A[1]!=null && B[1]!=null) ? {x:L(A[1],B[1]), y:L(A[2],B[2])} : null;
  const players = [];
  for (let k=0;k<PLAYERS.length;k++){
    const o=3+2*k;
    if (A[o]!=null && B[o]!=null){
      players.push({ pid:k, x:L(A[o],B[o]), y:L(A[o+1],B[o+1]),
        speed: Math.min(12, Math.hypot(B[o]-A[o],B[o+1]-A[o+1])/DT) });
    } else players.push(null);
  }
  return { ball, players, fi:i0 };
}
function cumDistAt(pid,mt){
  let fi=Math.max(0,Math.min(NF-2,mt/DT)), i0=Math.floor(fi), fr=fi-i0;
  return CUM[pid][i0] + (CUM[pid][i0+1]-CUM[pid][i0])*fr;
}
function scoreAt(mt){ let h=0,a=0;
  for(const g of DATA.goals) if(g.t<=mt){ g.team==='home'?h++:a++; }
  return [h,a]; }

const pad = n => String(n|0).padStart(2,'0');
function clockLabel(mt){
  if (mt<=P1DUR){
    if (mt<=2700) return '전반 '+pad(mt/60)+':'+pad(mt%60);
    const e=mt-2700; return '전반 45+'+pad(e/60)+':'+pad(e%60);
  }
  const base=2700+(mt-P1DUR);
  if (base<=5400) return '후반 '+pad(base/60)+':'+pad(base%60);
  const e=base-5400; return '후반 90+'+pad(e/60)+':'+pad(e%60);
}

// ===== Canvas / 경기장 =====
const cv=$('pitch'), ctx=cv.getContext('2d');
const pitchCache=document.createElement('canvas');
let pr={x:0,y:0,w:0,h:0}, DPR=1;
function layout(){
  const wrap=$('pitchWrap');
  DPR=Math.min(devicePixelRatio||1,2);
  const cw=wrap.clientWidth-24, ch=wrap.clientHeight-24;
  cv.width=cw*DPR; cv.height=ch*DPR; cv.style.width=cw+'px'; cv.style.height=ch+'px';
  const pad=18*DPR, aw=cv.width-pad*2, ah=cv.height-pad*2;
  let w=aw, h=w*68/105; if(h>ah){ h=ah; w=h*105/68; }
  pr={ x:(cv.width-w)/2, y:(cv.height-h)/2, w, h };
  drawPitchCache();
}
const m2x=mx=>pr.x+mx/PITCH.L*pr.w, m2y=my=>pr.y+my/PITCH.W*pr.h, mS=()=>pr.w/PITCH.L;
function drawPitchCache(){
  pitchCache.width=cv.width; pitchCache.height=cv.height;
  const g=pitchCache.getContext('2d'), S=mS();
  g.fillStyle='#1f7a3e'; g.fillRect(0,0,cv.width,cv.height);
  for(let i=0;i<12;i++){ g.fillStyle=i%2?'#2e8b46':'#288040';
    g.fillRect(pr.x+i*pr.w/12,pr.y,pr.w/12+1,pr.h); }
  g.strokeStyle='rgba(255,255,255,0.82)'; g.lineWidth=Math.max(1.5,2*DPR); g.lineJoin='round';
  const line=(x1,y1,x2,y2)=>{g.beginPath();g.moveTo(m2x(x1),m2y(y1));g.lineTo(m2x(x2),m2y(y2));g.stroke();};
  const rect=(x1,y1,x2,y2)=>g.strokeRect(m2x(x1),m2y(y1),(x2-x1)*S,(y2-y1)*S);
  rect(0,0,105,68); line(52.5,0,52.5,68);
  g.beginPath(); g.arc(m2x(52.5),m2y(34),9.15*S,0,7); g.stroke();
  const dot=(x,y)=>{g.fillStyle='rgba(255,255,255,0.82)';g.beginPath();g.arc(m2x(x),m2y(y),2.2*DPR,0,7);g.fill();};
  dot(52.5,34); dot(11,34); dot(94,34);
  rect(0,13.84,16.5,54.16); rect(88.5,13.84,105,54.16);
  rect(0,24.84,5.5,43.16);  rect(99.5,24.84,105,43.16);
  g.beginPath(); g.arc(m2x(11),m2y(34),9.15*S,-0.927,0.927); g.stroke();
  g.beginPath(); g.arc(m2x(94),m2y(34),9.15*S,Math.PI-0.927,Math.PI+0.927); g.stroke();
  g.lineWidth=Math.max(2,3*DPR); rect(-2,30.34,0,37.66); rect(105,30.34,107,37.66);
}

function drawFrame(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(pitchCache,0,0);
  const st=getState(matchTime), S=mS();
  // 선택 선수 동선
  if(selPid!==null){
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2*DPR; ctx.beginPath();
    let on=false;
    for(let f=0;f<=st.fi;f+=4){
      const o=3+2*selPid, X=DATA.frames[f][o], Y=DATA.frames[f][o+1];
      if(X==null){ on=false; continue; }
      const px=m2x(X), py=m2y(Y);
      on?ctx.lineTo(px,py):ctx.moveTo(px,py); on=true;
    }
    ctx.stroke();
  }
  // 선수
  const R=2.0*S;
  for(const p of st.players){
    if(!p) continue;
    const X=m2x(p.x), Y=m2y(p.y), col=PLAYERS[p.pid].team==='home'?HOME:AWAY;
    if(p.pid===selPid){
      ctx.beginPath(); ctx.arc(X,Y,R+5*DPR,0,7); ctx.strokeStyle='#fff'; ctx.lineWidth=3*DPR; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(X,Y,R,0,7); ctx.fillStyle=col; ctx.fill();
    ctx.lineWidth=1.5*DPR; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.stroke();
    ctx.font='bold '+(1.9*S)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=2.6*DPR; ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.strokeText(PLAYERS[p.pid].jersey,X,Y);
    ctx.fillStyle='#fff'; ctx.fillText(PLAYERS[p.pid].jersey,X,Y);
  }
  // 공
  if(st.ball){
    const bX=m2x(st.ball.x), bY=m2y(st.ball.y);
    ctx.beginPath(); ctx.arc(bX,bY,1.1*S,0,7); ctx.fillStyle='#f4d23a'; ctx.fill();
    ctx.lineWidth=1.4*DPR; ctx.strokeStyle='#3a2e00'; ctx.stroke();
  }
}

function syncUI(){
  $('clock').textContent=clockLabel(matchTime);
  $('tCur').textContent=clockLabel(matchTime);
  const sc=scoreAt(matchTime);
  $('score').textContent=sc[0]+' : '+sc[1];
  if(!dragTL) $('timeline').value=matchTime;
  if(selPid!==null) renderPanel();
}

// ===== 사이드 패널 =====
function renderPanel(){
  const box=$('panel');
  if(!ready){ box.innerHTML=''; return; }
  if(selPid===null){
    box.innerHTML=`
      <h2 class="text-[13px] font-bold text-white mb-1">${DATA.name}</h2>
      <p class="text-[10.5px] text-slate-500 mb-3">${DATA.sub}</p>
      <div class="space-y-1.5 text-[11.5px] mb-3">
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${HOME}"></span>홈 팀</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${AWAY}"></span>원정 팀</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:#f4d23a"></span>공</div>
      </div>
      <div class="p-2.5 rounded-lg bg-emerald-900/25 ring-1 ring-emerald-700/40 text-[10.5px] text-emerald-300/90 leading-relaxed">
        ✓ 이 데이터는 <b>실제 경기의 25Hz 광학 트래킹</b>(Metrica Sports 공개)이다 — 재구성·추정이 아닌 실측값.
        선수를 클릭하면 속도·이동거리·동선이 표시된다.
      </div>`;
    return;
  }
  const meta=PLAYERS[selPid], st=getState(matchTime), cu=st.players[selPid];
  const dist=cumDistAt(selPid,matchTime);
  const col = meta.team==='home'?HOME:AWAY;
  const stat=(l,v,u)=>`<div class="rounded-lg bg-slate-800/70 ring-1 ring-slate-700 px-3 py-2">
      <div class="text-[10px] text-slate-500">${l}</div>
      <div class="text-[16px] font-extrabold text-white tabular-nums">${v}<span class="text-[10px] font-medium text-slate-400"> ${u}</span></div></div>`;
  box.innerHTML=`
    <div class="flex items-center gap-2.5 mb-3">
      <div class="grid place-items-center w-11 h-11 rounded-full text-white font-extrabold text-[15px]"
           style="background:${col}">${meta.jersey}</div>
      <div><div class="text-[13px] font-bold text-white">${meta.team==='home'?'홈':'원정'} ${meta.jersey}번</div>
        <div class="text-[11px] text-slate-400">실측 트래킹 선수</div></div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      ${stat('현재 속도', cu?(cu.speed*3.6).toFixed(1):'—','km/h')}
      ${stat('총 이동거리',(dist/1000).toFixed(2),'km')}
      ${stat('최고 속도',(MAXSPD[selPid]*3.6).toFixed(1),'km/h')}
      ${stat('현재 좌표', cu?cu.x.toFixed(0)+','+cu.y.toFixed(0):'교체','m')}
    </div>
    <div class="mt-3 p-2.5 rounded-lg bg-emerald-900/30 ring-1 ring-emerald-700/40 text-[11px] text-emerald-300">
      ◍ 이 선수의 <b>실제 동선</b>이 경기장에 흰 선으로 표시됩니다.</div>
    <button id="deselect" class="mt-3 w-full py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-[12px] text-slate-300">선택 해제</button>`;
  $('deselect').onclick=()=>{ selPid=null; renderPanel(); };
}

// ===== 타임라인 마커 =====
function buildMarkers(){
  const box=$('markers'); box.innerHTML='';
  const ht=document.createElement('div');
  ht.className='absolute top-2 w-0.5 h-3 bg-slate-500';
  ht.style.left=(P1DUR/TOTAL*100)+'%'; ht.title='하프타임';
  box.appendChild(ht);
  for(const g of DATA.goals){
    const el=document.createElement('div');
    el.className='absolute w-3.5 h-3.5 rounded-full bg-amber-400 ring-2 ring-amber-200 '
              +'cursor-pointer pointer-events-auto hover:scale-125 transition-transform';
    el.style.left='calc('+(g.t/TOTAL*100)+'% - 7px)';
    el.title=g.min+"' "+(g.team==='home'?'홈':'원정')+' '+g.scorer+'번 골 — 클릭 시 전후 10초 재생';
    el.onclick=()=>{ matchTime=Math.max(0,g.t-10); replayStop=g.t+10;
      setSpeed(2); playing=true; updatePlayBtn(); };
    box.appendChild(el);
  }
}

// ===== 컨트롤 =====
function updatePlayBtn(){ $('playBtn').textContent=playing?'❚❚':'▶'; }
function setSpeed(s){ speed=s;
  document.querySelectorAll('.spd').forEach(b=>{
    b.classList.toggle('bg-emerald-600',+b.dataset.spd===s);
    b.classList.toggle('bg-slate-800',+b.dataset.spd!==s); }); }
$('playBtn').onclick=()=>{ if(!ready)return;
  if(matchTime>=TOTAL) matchTime=0;
  playing=!playing; replayStop=null; updatePlayBtn(); };
document.querySelectorAll('.spd').forEach(b=>b.onclick=()=>setSpeed(+b.dataset.spd));
let dragTL=false;
$('timeline').addEventListener('input',e=>{ if(!ready)return;
  dragTL=true; matchTime=+e.target.value; replayStop=null; syncUI(); });
$('timeline').addEventListener('change',()=>{ dragTL=false; });
cv.addEventListener('click',e=>{
  if(!ready)return;
  const rc=cv.getBoundingClientRect();
  const cxp=(e.clientX-rc.left)*(cv.width/rc.width), cyp=(e.clientY-rc.top)*(cv.height/rc.height);
  const st=getState(matchTime); let best=null,bd=3.0;
  for(const p of st.players){
    if(!p) continue;
    const dm=Math.hypot((cxp-m2x(p.x))/mS(),(cyp-m2y(p.y))/mS());
    if(dm<bd){ bd=dm; best=p.pid; }
  }
  selPid=best; renderPanel();
});
addEventListener('resize',()=>{ if(ready)layout(); });

// ===== 메인 루프 =====
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(playing){
    matchTime+=dt*speed;
    if(replayStop!==null && matchTime>=replayStop){ playing=false; replayStop=null; updatePlayBtn(); }
    if(matchTime>=TOTAL){ matchTime=TOTAL; playing=false; updatePlayBtn(); }
  }
  drawFrame(); syncUI();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
